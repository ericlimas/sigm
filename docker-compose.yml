version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sigm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sigm
      POSTGRES_PASSWORD: sigm
      POSTGRES_DB: sigm_db
    ports:
      - "5432:5432"
    volumes:
      - sigm_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sigm -d sigm_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sigm_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://sigm:sigm@postgres:5432/sigm_db?schema=public
    ports:
      - "3333:3333"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && npm run dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sigm_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3333/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm run dev -- --host"

volumes:
  sigm_pg_data:
